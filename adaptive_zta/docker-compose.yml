version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  sentinel-1:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_PORT: 8000
      REDIS_ENABLED: 1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    expose:
      - "8000"

  sentinel-2:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_PORT: 8000
      REDIS_ENABLED: 1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - sentinel-1
      - sentinel-2
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro

volumes:
  redis_data:
